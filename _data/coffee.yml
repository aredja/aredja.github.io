- name: Le Petit Marais
  city: Zurich
  country: Switzerland
  address: Hohlstrasse 502, 8048 Zurich
  latitude: 47.3895636
  longitude: 8.4946235
  rating: 8
  price: CHF 5.80
  scores:
    coffee: 7.1
    atmosphere: 8.2
    service: 9.1
  review: >-
    Le Petit Marais set out to bring the French art of viennoiserie to Zurich.
    Its name pays homage to Le Marais, the fashionable and historic Parisian
    district. This is rather amusing given that the café is located in
    Altstetten, Zurich's ninth district, which is famous for being almost
    everything except fashionable and historic, unless working-class heritage
    and concrete apartment blocks count. But this is neither a lecture on
    Altstetten nor an inquiry into the proper use of place names. It is about
    coffee, and Le Petit Marais continues to leave my palate confused. After
    four years of loyal visits, one might expect the quality of its cappuccino
    to have converged towards a steady state. Unfortunately, it still
    oscillates between "so good that it even overshadows the phenomenal
    vermicelles" and "I could have bought something useless at the Brocki next
    door with this money," conditional on which barista prepares it. The price, however,
    appears to follow a much clearer trend and shows no signs of being bounded above. I admit that
    I am biased: considered as a whole, the café is a must-visit for its
    pastries. But because this atlas primarily judges the cappuccino, the lack
    of consistency weighs heavily on the coffee score. Even so, after four
    years as a loyal customer, it is clearly not a good enough reason to stop
    visiting.
  personal_note: "The pastries are so good that they make repeated cappuccino disappointments a rational choice."
  map_url: https://share.google/5mNOCY1PCBx4DhxxV
- name: BASƎ
  city: Verona
  country: Italy
  address: Via Luigi da Porto 5, 37122 Verona
  latitude: 45.4337
  longitude: 10.9971
  rating: 9.2
  price: €3.50
  scores:
    coffee: 8.9
    atmosphere: 8.4
    service: 9.4
  review: >-
    Verona has no shortage of beauty: the UNESCO-listed historic centre,
    Piazza delle Erbe, the Roman Ponte Pietra, rebuilt after its destruction
    during the Second World War, and, of course, the Arena di Verona. Yet a
    fascinatingly large share of the city's visitors appear to prefer spending
    their time queuing to stare at a balcony. Speaking of bella Italia and its
    celebrated lifestyle, anyone expecting another enthusiastic account of the
    classical Italian café will be disappointed. BASƎ, formerly and at the
    time of my visit known as Garage Coffee Bros., may be known for many things,
    but certainly not for over-roasted beans, pre-ground coffee, or sour
    espresso. Many people will disagree with my assessment of the average
    Italian coffee experience, although I strongly suspect that their judgement
    is affected by holiday bias. BASƎ is nevertheless an essential stop in
    Verona. Coffee preparation is treated with remarkable seriousness and
    genuine care. The shop near the Arena is small and offers only a few seats,
    but it is thoughtfully and warmly designed. Rather than simply receiving
    whichever espresso is used for your cappuccino, you can choose the beans
    for the shot yourself. The staff explain their cultivation, roasting, and
    preparation, and you can smell the different coffees before deciding. You
    may have noticed by now that I thoroughly enjoyed the experience, which was
    completed by an excellent cappuccino. The coffee is comparatively
    expensive, but for anyone seeking something closer to fine-art coffee
    making in Verona, there exists at least one café that checks all the boxes.
    Perhaps that explains the new name.
  personal_note: "At the time of my visit, the café was still called Garage Coffee Bros."
  map_url: https://share.google/tyuIcHPegJluvBQmi
