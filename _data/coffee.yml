  review: >-
    The espresso can be rather sour. The cappuccino is usually very good,
    unless it spends ten minutes waiting at the bar before being served. The
    fountain gives the courtyard a particularly pleasant atmosphere, and on
    weekdays it is a very good place to meet friends.
  personal_note: "Personal bonus: this is where I met my wife."
